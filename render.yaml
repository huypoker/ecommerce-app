services:
  - type: web
    name: ecommerce-dart
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    disk:
      name: ecommerce-data
      mountPath: /data
      sizeGB: 1
