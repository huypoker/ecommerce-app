services:
  - type: web
    name: ecommerce-app
    runtime: node
    buildCommand: npm install
    startCommand: node seed.js && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: ecommerce-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
